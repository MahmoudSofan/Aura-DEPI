name: CI

on:
  push:
    branches: [main, "001-aura-marketing-platform"]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: ruff + mypy + pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,frontend]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy
        run: mypy

      - name: pytest
        env:
          AURA_RUN_LIVE_TESTS: "0"
        # Default suite skips the `live` mark; live-smoke tests are run
        # manually with AURA_RUN_LIVE_TESTS=1 against real backends.
        run: pytest -m "not live"
