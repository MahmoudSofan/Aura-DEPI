# Alembic configuration for Aura.
#
# Run from the repository root, e.g.:
#     alembic -c backend/persistence/alembic.ini upgrade head
#
# `%(here)s` resolves to the directory containing this file
# (i.e. `backend/persistence/`).

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite:///backend/data/aura.db

# Migration filenames: 0001_initial.py, 0002_<slug>.py, ...
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

# Standardised UTC timestamps inside migrations (cosmetic).
timezone = UTC

[post_write_hooks]
# Optional: keep migration files formatted with the project's ruff config.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
